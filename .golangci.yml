version: "2"

linters:
  default: standard
  enable:
    - errorlint
    - gocritic
    - gosec
    - modernize
    - nilerr
    - nolintlint
    - revive
    - unconvert
    - unparam
    - usestdlibvars
    - wastedassign
    - whitespace
    - intrange

  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment
        - shadow
    gosec:
      excludes: [G115]
    gocritic:
      enabled-tags: [diagnostic, style, performance]
    revive:
      rules:
        - name: exported
          disabled: true
    exhaustive:
      default-signifies-exhaustive: true

  exclusions:
    presets: [comments, std-error-handling, common-false-positives]
    rules:
      - path: _test\.go
        linters: [gosec, gocritic]

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    gofumpt:
      extra-rules: true
    goimports:
      local-prefixes:
        - github.com/golangsnmp/gomib-lsp

run:
  timeout: 5m
